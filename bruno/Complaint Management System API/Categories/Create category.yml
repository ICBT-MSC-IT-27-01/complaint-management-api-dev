    description: Created
    request:
      url: "{{baseUrl}}/api/v1/categories"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "parentCategoryId": 0,
            "sortOrder": 0
          }
    response:
      status: 201
