info:
  name: Health check
  type: http
  seq: 1
  tags:
    - Health

http:
  method: GET
  url: "{{baseUrl}}/api/v1/health"
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: https://localhost:7000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
