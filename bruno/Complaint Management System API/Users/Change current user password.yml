info:
  name: Change current user password
  type: http
  seq: 8
  tags:
    - Users

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/users/me/change-password"
  body:
    type: json
    data: |-
      {
        "currentPassword": "",
        "newPassword": "",
        "confirmPassword": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Password changed
    request:
      url: "{{baseUrl}}/api/v1/users/me/change-password"
      method: PUT
      body:
        type: json
        data: |-
          {
            "currentPassword": "",
            "newPassword": "",
            "confirmPassword": ""
          }
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
